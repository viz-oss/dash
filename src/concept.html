<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard Widget</title>
        <link rel="stylesheet" href="widgets/card.css">
        <!-- Using Font Awesome for the user icon -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body>

        <div class="widget-card">
            <div class="icon-container">
                <!-- Font Awesome icon for users -->
                <i class="fas fa-users user-icon"></i>
            </div>

            <h3 class="metric-title">Users</h3>

            <div class="metric-value">
                1,248
            </div>

            <div class="metric-change">
                <!-- Up arrow and percentage -->
                <span class="trend-icon up-arrow"><i class="fas fa-caret-up"></i></span>
                <span class="percentage">+ 12%</span>
                <span class="vs-text">vs last week</span>
            </div>

        </div>

    </body>
</html>
